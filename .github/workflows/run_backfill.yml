name: Manual Historical Backfill

on:
  workflow_dispatch:
    inputs:
      start_order:
        description: 'Target Order Name to Start From (e.g., #GLOBO1001)'
        required: true
        default: '#GLOBO1001'

jobs:
  run-backfill-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'

    - name: Install Network Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests supabase

    - name: Execute Backfill Engine
      env:
        SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        START_ORDER_INPUT: ${{ github.event.inputs.start_order }}
      run: |
        python backfill_history.py
