name: Live Shiprocket Data Sync

on:
  workflow_dispatch: # Gives you the manual "Run workflow" trigger button

jobs:
  run-shiprocket-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Network Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests supabase

    - name: Execute Verified Sync Engine
      env:
        SHIPROCKET_EMAIL: ${{ secrets.SHIPROCKET_EMAIL }}
        SHIPROCKET_PASSWORD: ${{ secrets.SHIPROCKET_PASSWORD }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        python sync_shiprocket.py
