name: MASTER Reporting Ledger Sync

on:
  schedule:
    # 1. First run: 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * *'
    # 2. Second run: 11:00 PM IST (5:30 PM UTC)
    - cron: '30 17 * * *'
  workflow_dispatch:
    # Allows manual trigger at any time

jobs:
  build-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository source tree
      uses: actions/checkout@v4

    - name: Set up Python Environment Matrix
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Runtime Database Libraries
      run: |
        python -m pip install --upgrade pip
        pip install pandas supabase requests

    - name: Execute Server-Side Ledger Processing Pipeline
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        python sync_reporting_table.py
